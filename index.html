<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meta 数据看板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
/* Password gate */
#pwd-gate{position:fixed;inset:0;background:#0a0d14;display:flex;align-items:center;justify-content:center;z-index:9999}
.pwd-box{background:#1a202c;border:1px solid #2d3748;border-radius:16px;padding:40px 48px;width:360px;text-align:center}
.pwd-box .logo{font-size:32px;margin-bottom:10px}
.pwd-box h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
.pwd-box .sub{font-size:12px;color:#718096;margin-bottom:28px}
.pwd-box input{width:100%;background:#0f1117;border:1px solid #2d3748;border-radius:8px;padding:11px 16px;color:#e2e8f0;font-size:14px;outline:none;letter-spacing:2px;text-align:center}
.pwd-box input:focus{border-color:#4c6ef5}
.pwd-box button{width:100%;margin-top:14px;padding:11px;background:linear-gradient(135deg,#3b5bdb,#4c6ef5);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.pwd-box button:hover{opacity:.88}
.pwd-box .err{font-size:12px;color:#fc8181;margin-top:10px;min-height:18px}
.pwd-box .hint{font-size:11px;color:#4a5568;margin-top:18px}
/* Main layout */
.header{background:linear-gradient(135deg,#1a1f35,#0f1117);border-bottom:1px solid #2d3748;padding:24px 40px}
.header h1{font-size:22px;font-weight:700;color:#fff}
.header .sub{font-size:13px;color:#718096;margin-top:4px}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;max-width:800px;width:100%}
.entry-card{background:#1a202c;border:1px solid #2d3748;border-radius:16px;padding:36px 32px;text-decoration:none;color:inherit;transition:all .2s;cursor:pointer;display:block}
.entry-card:hover{border-color:#4c6ef5;background:#1c2240;transform:translateY(-3px);box-shadow:0 8px 32px rgba(76,110,245,.18)}
.entry-card .icon{font-size:36px;margin-bottom:16px}
.entry-card h2{font-size:17px;font-weight:700;color:#fff;margin-bottom:8px}
.entry-card .desc{font-size:13px;color:#718096;line-height:1.6;margin-bottom:20px}
.entry-card .meta{font-size:11px;color:#4a5568;border-top:1px solid #2d3748;padding-top:14px;display:flex;justify-content:space-between}
.entry-card .go{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#3b5bdb,#4c6ef5);color:#fff;font-size:12px;font-weight:600;padding:8px 18px;border-radius:20px;transition:opacity .15s}
.entry-card:hover .go{opacity:.88}
.section-label{font-size:11px;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;margin-top:8px}
.footer{text-align:center;padding:20px;font-size:11px;color:#2d3748}
@media(max-width:600px){.cards{grid-template-columns:1fr}.header{padding:18px 20px}.main{padding:28px 16px}}
</style>
</head>
<body>
<div id="pwd-gate">
  <div class="pwd-box">
    <div class="logo">📊</div>
    <h2>Meta 数据看板</h2>
    <div class="sub">BlueFocus Meta · 请输入访问密码</div>
    <input type="password" id="pwd-input" placeholder="••••••••••" onkeydown="if(event.key==='Enter')checkPwd()">
    <button onclick="checkPwd()">进入</button>
    <div class="err" id="pwd-err"></div>
    <div class="hint">如不知道密码，请联系账户运营团队</div>
  </div>
</div>
<div class="header">
  <h1>Meta 数据看板</h1>
  <div class="sub">BlueFocus Meta · 账户运营团队</div>
</div>
<div class="main">
  <div id="all-cards">
    <!-- ── 账户运营团队固定卡片（由脚本维护，请勿手动修改）── -->
    <div class="section-label">账户运营团队</div>
    <div class="cards owner-cards">
      <a class="entry-card" href="/analysis.html">
        <div class="icon">📈</div>
        <h2>Meta 大盘分析</h2>
        <div class="desc">周度大盘账单分析报告，含总表、分层波动、TOP波动及最终汇总，可视化数据看板。</div>
        <div class="meta">
          <span>最新数据：0711</span>
          <span class="go">进入 →</span>
        </div>
      </a>
      <a class="entry-card" href="/quota.html">
        <div class="icon">🗂️</div>
        <h2>Meta 账户余量监测</h2>
        <div class="desc">各团队账户名额分配与使用情况追踪，支持周次切换、销售明细展开及 Excel 下载。</div>
        <div class="meta">
          <span>最新数据：0711</span>
          <span class="go">进入 →</span>
        </div>
      </a>
    </div>
    <!-- ── 团队其他成员卡片（从 cards/cards.json 动态加载）── -->
    <div id="team-cards-wrap" style="display:none">
      <div class="section-label">团队成员</div>
      <div class="cards" id="team-cards"></div>
    </div>
  </div>
</div>
<div class="footer">账户运营团队 · 每周更新</div>
<script>
const HASH = '736686525b5cb1f747370e6202d550cacbc0f8c102c2692fa4b45a9efcff7677';
const KEY  = 'quota_auth_v' + HASH.slice(0,8);
async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function checkPwd() {
  const h = await sha256(document.getElementById('pwd-input').value);
  if (h === HASH) {
    localStorage.setItem(KEY, '1');
    document.getElementById('pwd-gate').style.display = 'none';
    loadTeamCards();
  } else {
    const e = document.getElementById('pwd-err');
    e.textContent = '密码错误，请重试';
    setTimeout(() => e.textContent = '', 2500);
    document.getElementById('pwd-input').value = '';
  }
}
function loadTeamCards() {
  fetch('/cards/cards.json?t=' + Date.now())
    .then(r => r.json()).then(cards => {
      if (!cards || !cards.length) return;
      const wrap = document.getElementById('team-cards-wrap');
      const grid = document.getElementById('team-cards');
      wrap.style.display = '';
      grid.innerHTML = cards.map(c => `
        <a class="entry-card" href="${c.url}">
          <div class="icon">${c.icon||'📋'}</div>
          <h2>${c.title}</h2>
          <div class="desc">${c.desc||''}</div>
          <div class="meta">
            <span>最新数据：${c.date||'—'}</span>
            <span class="go">进入 →</span>
          </div>
        </a>`).join('');
    }).catch(() => {});
}
if (localStorage.getItem(KEY) === '1') {
  document.getElementById('pwd-gate').style.display = 'none';
  loadTeamCards();
}
</script>
</body>
</html>
